spring.application.name=Multi-Agent-Assistant
# Spring Boot Server
server.port=8080
server.servlet.context-path=/

# PostgreSQL (P2 Database)
spring.datasource.url=jdbc:postgresql://localhost:5433/finpulse_Assistant
spring.datasource.username=postgres
spring.datasource.password=postgres_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# JWT Configuration
jwt.secret=your_super_secret_key_here_min_256_bits_recommended_change_me_in_production
jwt.expiration=86400000

# Spring AI - Mistral
spring.ai.mistralai.api-key=${MISTRAL_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.7

# P1 API Base URL
p1.api.url=http://localhost:8000

# Logging
logging.level.root=INFO
logging.level.com.finpulse=DEBUG