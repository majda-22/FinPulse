version: '3.8'
services:
  assistant_db:
    image: pgvector/pgvector:pg16
    container_name: assistant_db
    ports:
      - "5433:5432"          # le port 5433 de ma machine mappe le port 5432 du conteneur
    environment:
      POSTGRES_DB: finpulse_Assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret
    volumes:
      - assistant_data:/var/lib/postgresql/data

volumes:
  assistant_data: