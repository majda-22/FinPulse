services:

  db:
    image: pgvector/pgvector:pg16
    container_name: finpulse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finpulse}
      POSTGRES_USER: ${POSTGRES_USER:-finpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finpulse_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finpulse} -d ${POSTGRES_DB:-finpulse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: finpulse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: finpulse_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  postgres_data:
  redis_data: